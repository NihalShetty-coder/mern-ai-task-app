name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend Lint
        working-directory: ./backend
        run: |
          npm ci
          npm run lint

      - name: Frontend Lint
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Worker Lint
        working-directory: ./worker
        run: |
          pip install flake8
          flake8 app.py

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mern-ai-backend:${{ github.sha }}

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mern-ai-worker:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mern-ai-frontend:${{ github.sha }}

  update-infra:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Update image tags
        run: |
          sed -i "s#mern-ai-backend:.*#mern-ai-backend:${{ github.sha }}#" k8s/staging/backend.yaml
          sed -i "s#mern-ai-worker:.*#mern-ai-worker:${{ github.sha }}#" k8s/staging/worker.yaml
          sed -i "s#mern-ai-frontend:.*#mern-ai-frontend:${{ github.sha }}#" k8s/staging/frontend.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/staging/backend.yaml k8s/staging/worker.yaml k8s/staging/frontend.yaml
          git commit -m "chore: update images to ${{ github.sha }}"
          git push
